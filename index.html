<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#controls {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:8px;
  z-index:1000;
}

#infoPanel {
  position:absolute;
  right:10px;
  top:10px;
  width:320px;
  background:white;
  padding:15px;
  border-radius:8px;
  z-index:1000;
  max-height:90vh;
  overflow:auto;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
<b>Tijd</b><br>
<input type="range" min="0" max="10" value="0" id="slider"><br><br>

<b>Personen</b><br>
<button onclick="togglePerson('Anne Frank')">Anne</button>
<button onclick="togglePerson('Edith Frank')">Edith</button>
<button onclick="togglePerson('Otto Frank')">Otto</button>
<button onclick="togglePerson('Rosa de Winter')">Rosa</button>
<button onclick="togglePerson('Judith de Winter')">Judith</button><br><br>

<button onclick="resetPersons()">Reset</button>
</div>

<div id="infoPanel">Klik op een persoon of locatie</div>

<script>

// kaart
const map = L.map('map').setView([50,10], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// kleuren
const colors = {
  "Anne Frank":"red",
  "Edith Frank":"pink",
  "Otto Frank":"green",
  "Rosa de Winter":"blue",
  "Judith de Winter":"purple"
};

let activePersons = new Set(Object.keys(colors));

// routes
const routes = {
"Rosa de Winter":[[52.14,6.2],[52.92,6.61],[50.03,19.2]],
"Judith de Winter":[[52.14,6.2],[52.92,6.61],[50.03,19.2]],
"Edith Frank":[[52.37,4.9],[52.92,6.61],[50.03,19.2]],
"Otto Frank":[[52.37,4.9],[52.92,6.61],[50.03,19.2]]
};

// deportatie
const deportationRoute = [
[52.14,6.2],
[52.92,6.61],
[50.03,19.2]
];

// 🚢 GEOJSON Monowai (origineel)
const monowaiGeoJSON = {
"type":"FeatureCollection",
"features":[
{"type":"Feature","properties":{"name":"Odessa","date":"21 mei 1945"},"geometry":{"type":"Point","coordinates":[30.7233,46.4825]}},
{"type":"Feature","properties":{"name":"Istanbul","date":"23 mei 1945"},"geometry":{"type":"Point","coordinates":[28.9784,41.0082]}},
{"type":"Feature","properties":{"name":"Kreta","date":"24 mei 1945"},"geometry":{"type":"Point","coordinates":[24.8093,35.2401]}},
{"type":"Feature","properties":{"name":"Sardinië","date":"25 mei 1945"},"geometry":{"type":"Point","coordinates":[9.0129,40.1209]}},
{"type":"Feature","properties":{"name":"Corsica","date":"26 mei 1945"},"geometry":{"type":"Point","coordinates":[9.0129,42.0396]}},
{"type":"Feature","properties":{"name":"Marseille","date":"27 mei 1945"},"geometry":{"type":"Point","coordinates":[5.3698,43.2965]}}
]
};

// 🔁 FIX: GeoJSON → Leaflet coords
const monowaiRoute = monowaiGeoJSON.features.map(f=>{
const [lon,lat]=f.geometry.coordinates;
return {
name:f.properties.name,
date:f.properties.date,
coords:[lat,lon]
};
});

// info
const infoData = {
"Rosa de Winter":"Rosa zorgde voor Edith Frank in Auschwitz en was aanwezig bij haar overlijden.",
"Edith Frank":"Moeder van Anne Frank. Overleed in Auschwitz.",
"Otto Frank":"Keerde terug via de Monowai naar Marseille.",
"Judith de Winter":"Dochter van Rosa de Winter.",
"westerbork":"Doorgangskamp.",
"auschwitz":"Vernietigingskamp."
};

function showInfo(key){
document.getElementById("infoPanel").innerHTML = infoData[key] || key;
}

let layers=[];

function update(){

layers.forEach(l=>map.removeLayer(l));
layers=[];

// routes
Object.keys(routes).forEach(person=>{
if(!activePersons.has(person)) return;

layers.push(
L.polyline(routes[person],{
color:colors[person],
weight:3
}).on("click",()=>showInfo(person)).addTo(map)
);
});

// deportatie
layers.push(
L.polyline(deportationRoute,{color:"darkred",weight:5}).addTo(map)
);

// Westerbork
layers.push(
L.circleMarker([52.92,6.61],{radius:10,fillColor:"yellow",fillOpacity:1})
.on("click",()=>showInfo("westerbork")).addTo(map)
);

// Auschwitz
layers.push(
L.circleMarker([50.03,19.2],{radius:10,fillColor:"red",fillOpacity:1})
.on("click",()=>showInfo("auschwitz")).addTo(map)
);

// 🚢 Monowai alleen Otto + Rosa
if(activePersons.has("Otto Frank") || activePersons.has("Rosa de Winter")){

const latlngs = monowaiRoute.map(p=>p.coords);

layers.push(
L.polyline(latlngs,{
color:"cyan",
dashArray:"6,10",
weight:4
}).addTo(map)
);

monowaiRoute.forEach(p=>{
layers.push(
L.circleMarker(p.coords,{radius:5,color:"cyan"})
.bindPopup(`<b>${p.name}</b><br>${p.date}`)
.addTo(map)
);
});
}

}

// toggles
function togglePerson(name){
if(activePersons.has(name)) activePersons.delete(name);
else activePersons.add(name);
update();
}

function resetPersons(){
activePersons=new Set(Object.keys(colors));
update();
}

// animatie
let trainMarker = L.circleMarker(deportationRoute[0],{radius:8,color:"black",fillColor:"yellow",fillOpacity:1}).addTo(map);
let shipMarker = L.circleMarker(monowaiRoute[0].coords,{radius:8,color:"blue",fillColor:"cyan",fillOpacity:1}).addTo(map);

function interpolate(a,b,t){
return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
}

function updateTrain(v){
const total=deportationRoute.length-1;
const seg=Math.floor(v/10*total);
const t=(v/10*total)-seg;

if(seg>=total){trainMarker.setLatLng(deportationRoute[total]);return;}
trainMarker.setLatLng(interpolate(deportationRoute[seg],deportationRoute[seg+1],t));
}

function updateShip(v){
const total=monowaiRoute.length-1;
const seg=Math.floor(v/10*total);
const t=(v/10*total)-seg;

if(seg>=total){shipMarker.setLatLng(monowaiRoute[total].coords);return;}
const a=monowaiRoute[seg].coords;
const b=monowaiRoute[seg+1].coords;
shipMarker.setLatLng(interpolate(a,b,t));
}

// slider
document.getElementById("slider").addEventListener("input",(e)=>{
const v=parseInt(e.target.value);
update();
updateTrain(v);
updateShip(v);
});

// init
update();

</script>

</body>
</html>
