<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden – Demo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#controls {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:8px;
  z-index:1000;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
  <b>Tijd</b><br>
  <input type="range" min="0" max="8" value="0" id="slider"><br><br>

  <b>Filters</b><br>
  <button onclick="setFilter('all')">Alles</button>
  <button onclick="setFilter('survivors')">Overleefd</button>
  <button onclick="setFilter('victims')">Overleden</button>
  <button onclick="setFilter('deportation')">Deportatie</button>
  <button onclick="setFilter('repatriation')">Repatriëring</button>
</div>

<script>

// 🌍 Kaart
const map = L.map('map').setView([50,10], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// 🎨 Kleuren
const colors = {
  "Anne Frank": "red",
  "Margot Frank": "orange",
  "Edith Frank": "pink",
  "Otto Frank": "green",
  "Rosa de Winter": "blue",
  "Judik de Winter": "purple"
};

// 👥 Overleving
const survivors = ["Otto Frank","Rosa de Winter","Judik de Winter"];
const victims = ["Anne Frank","Margot Frank","Edith Frank"];

// 🕰️ Tijdlijnen
const timelines = {

"Anne Frank": [
{year:1944, coords:[52.37,4.9]},
{year:1944.2, coords:[52.92,6.61]},
{year:1944.7, coords:[50.03,19.2]},
{year:1944.9, coords:[52.76,9.9]}
],

"Margot Frank": [
{year:1944, coords:[52.37,4.9]},
{year:1944.2, coords:[52.92,6.61]},
{year:1944.7, coords:[50.03,19.2]},
{year:1944.9, coords:[52.76,9.9]}
],

"Edith Frank": [
{year:1944, coords:[52.37,4.9]},
{year:1944.2, coords:[52.92,6.61]},
{year:1944.7, coords:[50.03,19.2]}
],

"Otto Frank": [
{year:1944, coords:[52.37,4.9]},
{year:1944.2, coords:[52.92,6.61]},
{year:1944.7, coords:[50.03,19.2]},
{year:1945.3, coords:[46.48,30.73]},
{year:1945.41, coords:[43.30,5.37]},
{year:1945.6, coords:[52.37,4.9]}
],

"Rosa de Winter": [
{year:1944.2, coords:[52.92,6.61]},
{year:1944.7, coords:[50.03,19.2]},
{year:1945.3, coords:[46.48,30.73]},
{year:1945.41, coords:[43.30,5.37]},
{year:1945.6, coords:[52.14,6.2]}
],

"Judik de Winter": [
{year:1944.2, coords:[52.92,6.61]},
{year:1944.7, coords:[50.03,19.2]},
{year:1945.6, coords:[52.14,6.2]}
]

};

// 🎛️ state
let currentFilter = "all";
let lines = [];
let markers = [];

// 🔄 Filter instellen
function setFilter(f){
  currentFilter = f;
  update(parseInt(document.getElementById("slider").value));
}

// 🗺️ Update kaart
function update(step){

  lines.forEach(l => map.removeLayer(l));
  markers.forEach(m => map.removeLayer(m));

  lines = [];
  markers = [];

  Object.keys(timelines).forEach(person => {

    if(currentFilter === "survivors" && !survivors.includes(person)) return;
    if(currentFilter === "victims" && !victims.includes(person)) return;

    const data = timelines[person];
    const coords = [];

    for(let i=0;i<=step && i<data.length;i++){
      coords.push(data[i].coords);

      const m = L.circleMarker(data[i].coords,{
        radius:6,
        color:colors[person]
      }).addTo(map);

      markers.push(m);
    }

    if(coords.length > 1){
      const line = L.polyline(coords,{
        color:colors[person],
        weight:3
      }).addTo(map);

      lines.push(line);
    }

  });

  // 🚂 Deportatie
  if(currentFilter === "all" || currentFilter === "deportation"){
    L.polyline([[52.92,6.61],[50.03,19.2]],{
      color:"yellow",
      weight:6,
      opacity:0.5
    }).addTo(map);
  }

  // 🚢 Repatriëring
  if(currentFilter === "all" || currentFilter === "repatriation"){
    L.polyline([[46.48,30.73],[43.30,5.37]],{
      color:"cyan",
      weight:6,
      dashArray:"5,10"
    }).addTo(map);
  }

}

// 🎚️ Slider
document.getElementById("slider")
.addEventListener("input",(e)=>{
  update(parseInt(e.target.value));
});

// init
update(0);

</script>

</body>
</html>
