<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }

#controls {
    position: absolute;
    top: 10px;
    right: 10px;
    background: white;
    padding: 10px;
    z-index: 1000;
    max-width: 240px;
    box-shadow: 0 0 12px rgba(0,0,0,0.3);
}

.person {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    cursor: pointer;
}

.person img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    margin-right: 6px;
}

#legend {
    position: absolute;
    bottom: 20px;
    right: 10px;
    background: white;
    padding: 10px;
    z-index: 1000;
    box-shadow: 0 0 12px rgba(0,0,0,0.3);
    font-size: 13px;
}

.legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
}

.legend-line {
    width: 30px;
    height: 4px;
    margin-right: 6px;
}
</style>
</head>

<body>

<div id="controls">

<div class="person" data-person="anne">
<input type="checkbox" id="anne" checked>
<img src="https://images.memorix.nl/anf/thumb/1920x1080/e2721f7d-9990-e64e-aaf7-085e8c37b11d.jpg">Anne
</div>

<div class="person" data-person="margot">
<input type="checkbox" id="margot" checked>
<img src="https://images.memorix.nl/anf/thumb/1920x1080/9c2717fe-2305-e3c1-33eb-8cac8fb8d7aa.jpg">Margot
</div>

<div class="person" data-person="otto">
<input type="checkbox" id="otto" checked>
<img src="https://images.memorix.nl/anf/thumb/1920x1080/e73c20a4-8bb2-307d-f5f0-2d93291a2009.jpg">Otto
</div>

<div class="person" data-person="edith">
<input type="checkbox" id="edith" checked>
<img src="https://images.memorix.nl/anf/thumb/1920x1080/9006f8f0-6a33-baaf-a392-73cfcefdc04b.jpg">Edith
</div>

<div class="person" data-person="rosa">
<input type="checkbox" id="rosa" checked>
<img src="https://maior-images.memorix.nl/anf/iiif/744cbfdd-a75c-0f87-3264-3de82034dd1f/355,350,600,600/max/0/default.jpg">Rosa
</div>

<div class="person" data-person="judy">
<input type="checkbox" id="judy" checked>
<img src="https://maior-images.memorix.nl/anf/iiif/8b8544a8-c77b-3bcc-7511-b2bee22bf7b5/50,70,900,900/max/0/default.jpg">Judy
</div>

<b>Jaar: <span id="yearLabel">1942</span></b><br>
<input type="range" id="yearSlider" min="1942" max="1945" value="1942">

</div>

<div id="legend">
<b>Legenda</b>
<div class="legend-item"><div class="legend-line" style="background:red"></div>Deportatie familie Frank</div>
<div class="legend-item"><div class="legend-line" style="background:blue"></div>Kampverplaatsing Anne en Margot</div>
<div class="legend-item"><div class="legend-line" style="background:green"></div>Deportatie familie De Winter</div>
<div class="legend-item"><div class="legend-line" style="background:orange"></div>Dwangarbeid Judy de Winter</div>
<div class="legend-item"><div class="legend-line" style="border-top:2px dashed black"></div>Repatriëring zee Rosa en Otto</div>
<div class="legend-item"><div class="legend-line" style="background:purple"></div>Repatriëring land Judy de Winter</div>
</div>

<div id="map"></div>

<script>

// MAP
var map = L.map('map').setView([52.1,5.3],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// LAYERS
var layers = {
anne:L.layerGroup().addTo(map),
margot:L.layerGroup().addTo(map),
otto:L.layerGroup().addTo(map),
edith:L.layerGroup().addTo(map),
rosa:L.layerGroup().addTo(map),
judy:L.layerGroup().addTo(map)
};

var nodeLayer = L.layerGroup().addTo(map);

// DATA ROUTES
var data = [

{year:1944, persons:["anne","margot","otto","edith"],
coords:[[52.37,4.89],[52.91,6.58],[53.21,6.56],[53.18,7.21],[53.07,8.80],[52.37,9.73],[52.52,13.40],[51.10,17.03],[50.03,19.17]],
style:{color:'red'}},

{year:1944, persons:["anne","margot"],
coords:[[50.03,19.17],[52.52,13.40],[53.55,9.99],[52.75,9.90]],
style:{color:'blue'}},

{year:1943, persons:["rosa","judy"],
coords:[[52.14,6.19],[52.91,6.58],[53.21,6.56],[53.18,7.21],[53.07,8.80],[52.37,9.73],[52.52,13.40],[51.10,17.03],[50.03,19.17]],
style:{color:'green'}},

{year:1944, persons:["judy"],
coords:[[50.03,19.17],[50.81,14.96]],
style:{color:'orange',dashArray:'5,5'}},

// LAND (Auschwitz → Odessa)
{
year:1945,
persons:["rosa","otto"],
coords:[
  [50.03,19.17],
  [49.83,24.02],
  [46.48,30.72]
],
style:{color:'purple',weight:4,opacity:0.9}
},

// ZEE (Monowai)
{
year:1945,
persons:["rosa","otto"],
coords:[
  [46.0,30.0],[45.0,29.5],[44.0,29.0],[43.0,28.9],[42.2,28.9],
  [41.5,29.0],[41.2,29.0],
  [40.9,29.2],[40.4,27.8],
  [39.8,26.2],[39.5,26.0],
  [38.5,25.0],[37.5,23.0],[36.5,21.0],[36.5,19.0],
  [37.5,16.5],[38.5,14.0],
  [40.0,11.5],[41.5,9.5],[42.5,8.0],[43.0,6.5],
  [43.29,5.36]
],
style:{color:'black',dashArray:'8,10',weight:4,opacity:0.9}
},

// LAND (Marseille → NL)
{
year:1945,
persons:["rosa","otto"],
coords:[
  [43.29,5.36],
  [49.61,6.13],
  [51.19,5.98],
  [52.09,5.12]
],
style:{color:'purple',weight:4,opacity:0.9}
},

// JUDY REPATRIERING (subtiel)
{
year:1945,
persons:["judy"],
coords:[
  [50.81,14.96],
  [50.75,15.05],
  [50.60,14.60],
  [50.10,14.40],
  [50.11,13.74],
  [51.34,12.37],
  [51.31,9.49],
  [51.19,5.98]
],
style:{color:'purple',weight:3,opacity:0.8,dashArray:'3,6'}
}

];

// NODES
var nodes = [
{year:1942, coords:[52.37,4.89], text:"<bold>Amsterdam</bold> – Onderduik, verraad, deportatie familie Frank"},
{year:1943, coords:[52.14,6.19], text:"<bold>Zutphen</bold> – Onderduik, ontdekking, arrestatie en deportatie familie De Winter"},
{year:1943, coords:[52.91,6.58], text:"<bold>Westerbork</bold> - Familie Frank en De Winter ontmoeten elkaar in strafbarak 67"},
{year:1944, coords:[50.03,19.17], text:"<bold>Auschwitz</bold>, mannen en vrouwen worden gescheiden.<br><br>Net als Anne, Margot en Edith Frank kwam kwamen Judy en Rosa De Winter na de selectie en registratie in barak 29 van Auschwitz-Birkenau terecht.<br>Judy werd op 26 oktober 1944 geselecteerd voor deportatie naar Kratzau waar ze dwangarbeid moest verrichten. Anne en Margot werden een paar dagen later geselecteerd voor deportatie naar Bergen-Belsen, waardoor zowel Rosa als Edith zonder hun dochters in Auschwitz achterbleven. Rosa schreef daarover later: <em>‘Wij troosten elkaar en worden vriendinnen.’</em><br><br>Door de slechte omstandigheden in het kamp, de mishandelingen, het gebrek aan voedsel en de ziektes die rondgingen, raakten Rosa en Edith ernstig verzwakt. Het duurde dan ook niet lang voordat Edith door Rosa naar de ziekenbarak werd gebracht. Enige tijd later werd ook zijzelf ernstig ziek en kwam ze Edith weer tegen in de ziekenbarak. Rosa schreef: <em>‘Op een morgen komen nieuwe patiënten binnen. Ineens herken ik Edith, zij komt uit een andere ziekenafdeling. Zij is nog maar een schim. Enkele dagen nadien sterft zij, totaal uitgeput.’</em><br>Rosa zelf wist Auschwitz ternauwernood te overleven. Op 27 januari 1945 werd het kamp bevrijd door het Sovjetleger."},
{year:1945, coords:[52.75,9.90], text:"<bold>Bergen-Belsen</bold> - Eind oktober of begin november werden Margot en Anne op transport gezet en belandden in Bergen-Belsen.<br>Margot kreeg vlektyfus en overleed in februari 1945, waarschijnlijk kort voor haar 19e verjaardag. Ook Anne kreeg vlektyfus en overleed kort na haar zuster, op 15-jarige leeftijd."},
{year:1945, coords:[51.19,5.98], text:"<bold>Roermond</bold> – Op 31 mei 1945 werden Judy en moeder Rosa in een klooster in de buurt van Roermond herenigd."},
{year:1945, coords:[50.81,14.96], text:"<bold>Kratzau</bold> – Op 26 oktober 1944 werd Judy geselecteerd voor deportatie naar Kratzau (Chrastava). In het kamp werd ze tewerkgesteld en moest ze granaten vullen.<br>Op 8 mei 1945 werd ze bevrijd door het Sovjetleger. Via Reichenberg (Liberec) reisde ze per trein en vrachtwagen naar Praag, Pilsen, Bayreuth en uiteindelijk naar België."},
{year:1945, coords:[50.27,19.03], text:"<bold>Katowice</bold>, Op de terugreis naar Nederland ontmoette Rosa in Katowice Otto Frank. Uit het notitieboekje van Otto Frank blijkt dat zij hem op 22 maart 1945 vertelde dat Edith gestorven was: ‘22. Mevr. De Winter, Zutphen. Bericht overlijden van Edith op 6. Jan. 45 in het ziekenhuis uit zwakte zonder te lijden.’ Ze maakte dezelfde repatriëringsreis als Otto Frank en vertrok op 21 mei 1945 met de Monowai van Odessa naar Marseille, waar ze op 27 mei 1945 aankwam."}
];

// RENDER
function render(year){
Object.values(layers).forEach(l => l.clearLayers());
nodeLayer.clearLayers();

data.forEach(function(route){
if(route.year <= year){
route.persons.forEach(function(p){
if(document.getElementById(p).checked){
L.polyline(route.coords, route.style).addTo(layers[p]);
}
});
}
});

nodes.forEach(function(n){
if(n.year <= year){
L.circleMarker(n.coords,{
radius:6,color:'black',fillColor:'yellow',fillOpacity:0.9
})
.bindPopup(n.text)
.addTo(nodeLayer);
}
});
}

// EVENTS
document.getElementById("yearSlider").addEventListener("input", function(){
document.getElementById("yearLabel").innerText = this.value;
render(parseInt(this.value));
});

["anne","margot","otto","edith","rosa","judy"].forEach(function(id){
document.getElementById(id).addEventListener("change", function(){
render(parseInt(document.getElementById("yearSlider").value));
});
});

// INIT
render(1942);

</script>

</body>
</html>
