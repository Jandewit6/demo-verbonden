<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }

#controls {
    position: absolute;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    z-index: 1000;
    max-width: 220px;
}

.person {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
}

.person img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    margin-right: 6px;
}

#sliderContainer {
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="controls">

<div class="person"><input type="checkbox" id="anne" checked>
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Anne_Frank_1940_cropped.jpg">Anne</div>

<div class="person"><input type="checkbox" id="margot" checked>
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Margot_Frank.jpg">Margot</div>

<div class="person"><input type="checkbox" id="otto" checked>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Otto_Frank.jpg">Otto</div>

<div class="person"><input type="checkbox" id="edith" checked>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Edith_Frank.jpg">Edith</div>

<div class="person"><input type="checkbox" id="rosa" checked>
<img src="https://via.placeholder.com/30">Rosa</div>

<div class="person"><input type="checkbox" id="judy" checked>
<img src="https://via.placeholder.com/30">Judy</div>

<div id="sliderContainer">
<b>Jaar: <span id="yearLabel">1942</span></b><br>
<input type="range" id="yearSlider" min="1942" max="1945" value="1942">
</div>

</div>

<div id="map"></div>

<script>

// ==========================
// MAP
// ==========================

var map = L.map('map').setView([52.1,5.3],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// ==========================
// LAYERS
// ==========================

var layers = {
    anne: L.layerGroup().addTo(map),
    margot: L.layerGroup().addTo(map),
    otto: L.layerGroup().addTo(map),
    edith: L.layerGroup().addTo(map),
    rosa: L.layerGroup().addTo(map),
    judy: L.layerGroup().addTo(map)
};

// ==========================
// ROUTES MET JAAR
// ==========================

var data = [
    // FRANK deportatie (1944)
    {year:1944, persons:["anne","margot","otto","edith"],
     coords:[[52.37,4.89],[52.91,6.58],[53.21,6.56],[53.18,7.21],
     [53.07,8.80],[52.37,9.73],[52.52,13.40],[51.10,17.03],[50.03,19.17]],
     style:{color:'red'}},

    // Anne & Margot (1944)
    {year:1944, persons:["anne","margot"],
     coords:[[50.03,19.17],[52.52,13.40],[53.55,9.99],[52.75,9.90]],
     style:{color:'blue'}},

    // De Winter deportatie (1943)
    {year:1943, persons:["rosa","judy"],
     coords:[[52.14,6.19],[52.91,6.58],[53.21,6.56],[53.18,7.21],
     [53.07,8.80],[52.37,9.73],[52.52,13.40],[51.10,17.03],[50.03,19.17]],
     style:{color:'green'}},

    // Judy Kratzau (1944)
    {year:1944, persons:["judy"],
     coords:[[50.03,19.17],[50.81,14.96]],
     style:{color:'orange',dashArray:'5,5'}},

    // Repatriëring Rosa + Otto (1945)
    {year:1945, persons:["rosa","otto"],
     coords:[[50.03,19.17],[49.83,24.02],[46.48,30.72],
     [43,34],[38,28],[36,20],[43.29,5.36],
     [49.61,6.13],[51.19,5.98],[52.09,5.12]],
     style:{color:'black',dashArray:'8,10'}},

    // Judy repatriëring (1945)
    {year:1945, persons:["judy"],
     coords:[[50.81,14.96],[50.76,15.05],[50.07,14.43],
     [49.73,13.37],[49.94,11.57],[50.85,4.35],[51.19,5.98]],
     style:{color:'purple'}}
];

// ==========================
// RENDER FUNCTIE
// ==========================

function render(year){

    Object.values(layers).forEach(l => l.clearLayers());

    data.forEach(function(route){

        if(route.year <= year){

            route.persons.forEach(function(p){

                if(document.getElementById(p).checked){
                    L.polyline(route.coords, route.style).addTo(layers[p]);
                }

            });

        }

    });

}

// ==========================
// EVENTS
// ==========================

var slider = document.getElementById("yearSlider");
var label = document.getElementById("yearLabel");

slider.addEventListener("input", function(){
    label.innerText = slider.value;
    render(parseInt(slider.value));
});

["anne","margot","otto","edith","rosa","judy"].forEach(function(id){
    document.getElementById(id).addEventListener("change", function(){
        render(parseInt(slider.value));
    });
});

// INIT
render(1942);

</script>

</body>
</html>
