<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }

/* UI */
#controls {
    position: absolute;
    top: 10px;
    right: 10px;
    background: white;
    padding: 10px;
    z-index: 1000;
    max-width: 240px;
    box-shadow: 0 0 12px rgba(0,0,0,0.3);
}

.person {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    cursor: pointer;
}

.person img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    margin-right: 6px;
}

/* legenda */
#legend {
    position: absolute;
    bottom: 20px;
    right: 10px;
    background: white;
    padding: 10px;
    z-index: 1000;
    box-shadow: 0 0 12px rgba(0,0,0,0.3);
    font-size: 13px;
}

.legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
}

.legend-line {
    width: 30px;
    height: 4px;
    margin-right: 6px;
}

/* labels */
.smart-label {
    background: rgba(255,255,255,0.9);
    border: 1px solid #333;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="controls">
<div class="person" data-person="anne"><input type="checkbox" id="anne" checked><img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Anne_Frank_1940_cropped.jpg">Anne</div>
<div class="person" data-person="margot"><input type="checkbox" id="margot" checked><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Margot_Frank.jpg">Margot</div>
<div class="person" data-person="otto"><input type="checkbox" id="otto" checked><img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Otto_Frank.jpg">Otto</div>
<div class="person" data-person="edith"><input type="checkbox" id="edith" checked><img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Edith_Frank.jpg">Edith</div>
<div class="person" data-person="rosa"><input type="checkbox" id="rosa" checked><img src="images/rosa.jpg">Rosa</div>
<div class="person" data-person="judy"><input type="checkbox" id="judy" checked><img src="images/judy.jpg">Judy</div>

<b>Jaar: <span id="yearLabel">1942</span></b><br>
<input type="range" id="yearSlider" min="1942" max="1945" value="1942">
</div>

<div id="legend">
<b>Legenda</b>
<div class="legend-item"><div class="legend-line" style="background:red"></div>Deportatie</div>
<div class="legend-item"><div class="legend-line" style="background:blue"></div>Kampverplaatsing</div>
<div class="legend-item"><div class="legend-line" style="background:green"></div>De Winter</div>
<div class="legend-item"><div class="legend-line" style="background:orange"></div>Dwangarbeid</div>
<div class="legend-item"><div class="legend-line" style="border-top:2px dashed black"></div>Repatriëring zee</div>
<div class="legend-item"><div class="legend-line" style="background:purple"></div>Repatriëring land</div>

<div style="margin-top:8px;"><b>Knooppunten</b></div>
<div class="legend-item"><div class="legend-line" style="background:white;border:1px solid black;"></div>Start</div>
<div class="legend-item"><div class="legend-line" style="background:yellow;"></div>Ontmoeting</div>
<div class="legend-item"><div class="legend-line" style="background:red;"></div>Kamp</div>
<div class="legend-item"><div class="legend-line" style="background:blue;"></div>Transport</div>
</div>

<div id="map"></div>

<script>

// MAP
var map = L.map('map').setView([52.1,5.3],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// LAYERS
var layers = {
anne:L.layerGroup().addTo(map),
margot:L.layerGroup().addTo(map),
otto:L.layerGroup().addTo(map),
edith:L.layerGroup().addTo(map),
rosa:L.layerGroup().addTo(map),
judy:L.layerGroup().addTo(map)
};

var nodeLayer = L.layerGroup().addTo(map);

// ROUTES
var data = [

{year:1944, persons:["anne","margot","otto","edith"],
coords:[[52.37,4.89],[52.91,6.58],[53.21,6.56],[53.18,7.21],[53.07,8.80],[52.37,9.73],[52.52,13.40],[51.10,17.03],[50.03,19.17]],
style:{color:'red'}},

{year:1944, persons:["anne","margot"],
coords:[[50.03,19.17],[52.52,13.40],[53.55,9.99],[52.75,9.90]],
style:{color:'blue'}},

{year:1943, persons:["rosa","judy"],
coords:[[52.14,6.19],[52.91,6.58],[53.21,6.56],[53.18,7.21],[53.07,8.80],[52.37,9.73],[52.52,13.40],[51.10,17.03],[50.03,19.17]],
style:{color:'green'}},

{year:1944, persons:["judy"],
coords:[[50.03,19.17],[50.67,17.92],[51.10,17.03],[50.76,15.05],[50.8167,14.9667]],
style:{color:'orange',dashArray:'5,5'}},

{year:1945, persons:["rosa","otto"],
coords:[[50.03,19.17],[49.83,24.02],[46.48,30.72],[43,34],[38,28],[36,20],[43.29,5.36],[49.61,6.13],[51.19,5.98],[52.09,5.12]],
style:{color:'black',dashArray:'8,10'}},

{year:1945, persons:["judy"],
coords:[[50.8167,14.9667],[50.76,15.05],[50.07,14.43],[49.73,13.37],[49.94,11.57],[50.85,4.35],[51.19,5.98]],
style:{color:'purple'}}

];

// NODE STYLES
function getNodeStyle(type){
if(type==="start") return {color:"black", fillColor:"white"};
if(type==="meeting") return {color:"black", fillColor:"yellow"};
if(type==="camp") return {color:"black", fillColor:"red"};
if(type==="transport") return {color:"black", fillColor:"blue"};
}

function getTypeLabel(type){
if(type==="start") return "Startpunt";
if(type==="meeting") return "Ontmoeting";
if(type==="camp") return "Kamp / geweld";
if(type==="transport") return "Transport";
}

function isNodeVisibleForPerson(node){
if(hoverPerson){
return node.focusPersons.includes(hoverPerson);
}
return node.focusPersons.some(p => document.getElementById(p).checked);
}

// NODES
var nodes = [
{year:1942,type:"start",coords:[52.37,4.89],title:"Amsterdam",short:"Onderduik",persons:["Frank familie"],focusPersons:["anne","margot","otto","edith"],desc:"Onderduik familie Frank"},
{year:1943,type:"start",coords:[52.14,6.19],title:"Zutphen",short:"Arrestatie",persons:["Rosa","Judy"],focusPersons:["rosa","judy"],desc:"Vertrek De Winter"},
{year:1943,type:"meeting",coords:[52.91,6.58],title:"Westerbork",short:"Ontmoeting",persons:["Beide families"],focusPersons:["anne","margot","otto","edith","rosa","judy"],desc:"Families ontmoeten elkaar"},
{year:1944,type:"camp",coords:[50.03,19.17],title:"Auschwitz",short:"Scheiding, Edith sterft",persons:["Allen"],focusPersons:["anne","margot","otto","edith","rosa","judy"],desc:"Scheiding en overlijden Edith"},
{year:1944,type:"transport",coords:[50.76,15.05],title:"Liberec",short:"Transportknooppunt",persons:["Judy"],focusPersons:["judy"],desc:"Doorvoer naar Kratzau"},
{year:1944,type:"camp",coords:[50.8167,14.9667],title:"Kratzau",short:"Dwangarbeid",persons:["Judy"],focusPersons:["judy"],desc:"Subkamp Gross-Rosen"},
{year:1944,type:"camp",coords:[52.75,9.90],title:"Bergen-Belsen",short:"Overlijden Anne & Margot",persons:["Anne","Margot"],focusPersons:["anne","margot"],desc:"Overlijden"},
{year:1945,type:"meeting",coords:[51.19,5.98],title:"Roermond",short:"Hereniging",persons:["Rosa","Judy"],focusPersons:["rosa","judy"],desc:"Hereniging"}
];

// HOVER
var hoverPerson = null;

// RENDER
function render(year){

Object.values(layers).forEach(l => l.clearLayers());
nodeLayer.clearLayers();

data.forEach(function(route){
if(route.year <= year){
route.persons.forEach(function(p){
if(document.getElementById(p).checked){

var style = Object.assign({}, route.style);

if(hoverPerson){
if(p===hoverPerson){style.weight=6;}
else{style.opacity=0.2;}
}

L.polyline(route.coords, style).addTo(layers[p]);
}
});
}
});

// nodes
nodes.forEach(function(n){
if(n.year <= year){

var style = getNodeStyle(n.type);

var persons = n.persons.join(", ");

var popupContent =
"<b>"+n.title+"</b><br>"+
"<i>"+getTypeLabel(n.type)+"</i><br><br>"+
"<b>Betrokken:</b> "+persons+"<br><br>"+n.desc;

var marker = L.circleMarker(n.coords,{
radius:7,
color:style.color,
fillColor:style.fillColor,
fillOpacity:0.9
});

// slimme labels
if(isNodeVisibleForPerson(n)){
marker.bindTooltip(n.title+" – "+n.short,{permanent:true,direction:"top",offset:[0,-10],className:"smart-label"});
}

marker.addTo(nodeLayer);

// klik met popup fix
marker.on("click", function(){

document.getElementById("yearSlider").value = n.year;
document.getElementById("yearLabel").innerText = n.year;

["anne","margot","otto","edith","rosa","judy"].forEach(p=>{
document.getElementById(p).checked=false;
});

n.focusPersons.forEach(p=>{
document.getElementById(p).checked=true;
});

map.setView(n.coords,6);
render(n.year);

setTimeout(function(){
L.popup()
.setLatLng(n.coords)
.setContent(popupContent)
.openOn(map);
},50);

});

}
});

}

// EVENTS
document.getElementById("yearSlider").addEventListener("input", function(){
document.getElementById("yearLabel").innerText = this.value;
render(parseInt(this.value));
});

["anne","margot","otto","edith","rosa","judy"].forEach(function(id){
document.getElementById(id).addEventListener("change", function(){
render(parseInt(document.getElementById("yearSlider").value));
});
});

document.querySelectorAll(".person").forEach(function(el){
el.addEventListener("mouseenter", function(){
hoverPerson = el.dataset.person;
render(parseInt(document.getElementById("yearSlider").value));
});
el.addEventListener("mouseleave", function(){
hoverPerson = null;
render(parseInt(document.getElementById("yearSlider").value));
});
});

// INIT
render(1942);

</script>

</body>
</html>
