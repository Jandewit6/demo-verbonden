<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }

#controls {
    position: absolute;
    top: 10px;
    right: 10px;
    background: white;
    padding: 10px;
    z-index: 1000;
    max-width: 240px;
    box-shadow: 0 0 12px rgba(0,0,0,0.3);
}

.person {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    cursor: pointer;
}

.person img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    margin-right: 6px;
}

#legend {
    position: absolute;
    bottom: 20px;
    right: 10px;
    background: white;
    padding: 10px;
    z-index: 1000;
    box-shadow: 0 0 12px rgba(0,0,0,0.3);
    font-size: 13px;
}

.legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
}

.legend-line {
    width: 30px;
    height: 4px;
    margin-right: 6px;
}
</style>
</head>

<body>

<div id="controls">

<div class="person" data-person="anne"><input type="checkbox" id="anne" checked>Anne</div>
<div class="person" data-person="margot"><input type="checkbox" id="margot" checked>Margot</div>
<div class="person" data-person="otto"><input type="checkbox" id="otto" checked>Otto</div>
<div class="person" data-person="edith"><input type="checkbox" id="edith" checked>Edith</div>
<div class="person" data-person="rosa"><input type="checkbox" id="rosa" checked>Rosa</div>
<div class="person" data-person="judy"><input type="checkbox" id="judy" checked>Judy</div>

<b>Jaar: <span id="yearLabel">1945</span></b><br>
<input type="range" id="yearSlider" min="1942" max="1945" value="1945">

</div>

<div id="map"></div>

<script>

// MAP
var map = L.map('map').setView([52.1,5.3],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// LAYERS
var layers = {
anne:L.layerGroup().addTo(map),
margot:L.layerGroup().addTo(map),
otto:L.layerGroup().addTo(map),
edith:L.layerGroup().addTo(map),
rosa:L.layerGroup().addTo(map),
judy:L.layerGroup().addTo(map)
};

var nodeLayer = L.layerGroup().addTo(map);

// DATA
var data = [
{year:1944, persons:["anne","margot","otto","edith"], coords:[[52.37,4.89],[52.91,6.58],[50.03,19.17]], style:{color:'red'}},
{year:1943, persons:["rosa","judy"], coords:[[52.14,6.19],[52.91,6.58],[50.03,19.17]], style:{color:'green'}},
{year:1945, persons:["rosa","otto"], coords:[[50.03,19.17],[46.48,30.72]], style:{color:'purple'}}
];

// NODES
var nodes = [
{year:1942, coords:[52.37,4.89], text:"Amsterdam"},
{year:1943, coords:[52.91,6.58], text:"Westerbork"},
{year:1944, coords:[50.03,19.17], text:"Auschwitz"},
{year:1945, coords:[51.19,5.98], text:"Roermond"}
];

// RENDER
function render(year){
Object.values(layers).forEach(l => l.clearLayers());
nodeLayer.clearLayers();

data.forEach(function(route){
if(route.year <= year){
route.persons.forEach(function(p){
if(document.getElementById(p).checked){
L.polyline(route.coords, route.style).addTo(layers[p]);
}
});
}
});

nodes.forEach(function(n){
if(n.year <= year){
L.circleMarker(n.coords,{radius:6,color:'black',fillColor:'yellow',fillOpacity:0.9})
.bindPopup(n.text)
.addTo(nodeLayer);
}
});
}

// EVENTS
document.getElementById("yearSlider").addEventListener("input", function(){
const year = parseInt(this.value);
document.getElementById("yearLabel").innerText = year;
render(year);
});

document.querySelectorAll(".person").forEach(function(el){
el.addEventListener("click", function(e){
if(e.target.tagName === "INPUT") return;
const id = this.dataset.person;
const cb = document.getElementById(id);
cb.checked = !cb.checked;
render(parseInt(document.getElementById("yearSlider").value));
});
});

// INIT
render(1945);

</script>

</body>
</html>
