<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }

#controls {
    position: absolute;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    z-index: 1000;
    max-width: 200px;
    font-size: 14px;
}

.person {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
}

.person img {
    width: 30px;
    height: 30px;
    margin-right: 8px;
    border-radius: 50%;
}
</style>
</head>

<body>

<div id="controls">

<div class="person">
<input type="checkbox" id="anne" checked>
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Anne_Frank_1940_cropped.jpg">
<label for="anne">Anne</label>
</div>

<div class="person">
<input type="checkbox" id="margot" checked>
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Margot_Frank.jpg">
<label>Margot</label>
</div>

<div class="person">
<input type="checkbox" id="otto" checked>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Otto_Frank.jpg">
<label>Otto</label>
</div>

<div class="person">
<input type="checkbox" id="edith" checked>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Edith_Frank.jpg">
<label>Edith</label>
</div>

<div class="person">
<input type="checkbox" id="rosa" checked>
<img src="https://via.placeholder.com/30">
<label>Rosa</label>
</div>

<div class="person">
<input type="checkbox" id="judy" checked>
<img src="https://via.placeholder.com/30">
<label>Judy</label>
</div>

</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([52.1,5.3],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// ==========================
// LAGEN PER PERSOON
// ==========================

var layers = {
    anne: L.layerGroup().addTo(map),
    margot: L.layerGroup().addTo(map),
    otto: L.layerGroup().addTo(map),
    edith: L.layerGroup().addTo(map),
    rosa: L.layerGroup().addTo(map),
    judy: L.layerGroup().addTo(map)
};

// ==========================
// FUNCTIE OM TOE TE VOEGEN
// ==========================

function addMarker(layer, coords, text){
    L.marker(coords).bindPopup(text).addTo(layer);
}

function addLine(layer, coords, style){
    L.polyline(coords, style).addTo(layer);
}

// ==========================
// ANNE / MARGOT / OTTO / EDITH
// ==========================

var frankRoute = [
[52.3702,4.8952],[52.9167,6.5833],[53.2194,6.5665],
[53.1833,7.2167],[53.0793,8.8017],[52.3759,9.7320],
[52.5200,13.4050],[51.1079,17.0385],[50.0359,19.1783]
];

addLine(layers.anne, frankRoute, {color:'red'});
addLine(layers.margot, frankRoute, {color:'red'});
addLine(layers.otto, frankRoute, {color:'red'});
addLine(layers.edith, frankRoute, {color:'red'});

// Anne & Margot vervolg
var sisters = [
[50.0359,19.1783],[52.5200,13.4050],
[53.5511,9.9937],[52.7596,9.9059]
];

addLine(layers.anne, sisters, {color:'blue'});
addLine(layers.margot, sisters, {color:'blue'});

// Otto repatriëring (zelfde als Rosa)
var returnRoute = [
[50.0359,19.1783],[49.8397,24.0297],[46.4825,30.7233],
[43,34],[38,28],[36,20],[43.2965,5.3698],
[50.1109,8.6821],[52.0907,5.1214]
];

addLine(layers.otto, returnRoute, {color:'black',dashArray:'8,10'});

// ==========================
// ROSA
// ==========================

var rosaRoute = [
[52.1400,6.1944],[52.9167,6.5833],[53.2194,6.5665],
[53.1833,7.2167],[53.0793,8.8017],[52.3759,9.7320],
[52.5200,13.4050],[51.1079,17.0385],[50.0359,19.1783]
];

addLine(layers.rosa, rosaRoute, {color:'green'});
addLine(layers.rosa, returnRoute, {color:'black',dashArray:'8,10'});

// ==========================
// JUDY
// ==========================

var judyRoute = [
[52.1400,6.1944],[52.9167,6.5833],[50.0359,19.1783]
];

addLine(layers.judy, judyRoute, {color:'green'});

var judyReturn = [
[50.8167,14.9667],[50.7671,15.0562],[50.0755,14.4378],
[49.7384,13.3736],[49.9481,11.5783],
[50.8503,4.3517],[51.1942,5.9870]
];

addLine(layers.judy, judyReturn, {color:'purple'});

// ==========================
// FILTER LOGICA
// ==========================

function toggleLayer(id){
    var checkbox = document.getElementById(id);
    if(checkbox.checked){
        map.addLayer(layers[id]);
    } else {
        map.removeLayer(layers[id]);
    }
}

["anne","margot","otto","edith","rosa","judy"].forEach(function(id){
    document.getElementById(id).addEventListener("change", function(){
        toggleLayer(id);
    });
});

</script>

</body>
</html>
