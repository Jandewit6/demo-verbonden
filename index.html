<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden – Leaflet</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- D3 -->
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; display:flex; font-family:Arial; }
#map { width:60%; height:100vh; }
#network { width:40%; height:100vh; background:#111; }

.node { fill:white; cursor:pointer; }
.node.active { fill:red; }
.link { stroke:#888; }
.link.active { stroke:red; stroke-width:2; }

#info {
  position:absolute;
  top:20px;
  left:20px;
  background:white;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>
<svg id="network"></svg>
<div id="info">Klik op een persoon</div>

<script>

// 🌍 Leaflet kaart
const map = L.map('map').setView([52,10], 5);

// OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

// 📍 Locaties per persoon
const personLocations = {
  "Anne Frank": [[52.37,4.9],[52.92,6.61],[50.03,19.2],[52.76,9.9]],
  "Margot Frank": [[50.03,19.2],[52.76,9.9]],
  "Edith Frank": [[50.03,19.2]],
  "Otto Frank": [[50.03,19.2]],
  "Rosa de Winter": [[52.14,6.2]]
};

let markers = [];
let routeLine = null;

// 🎯 Toon route
function showRoute(person){

  // markers verwijderen
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  // lijn verwijderen
  if(routeLine){
    map.removeLayer(routeLine);
  }

  const coords = personLocations[person] || [];

  const latlngs = coords.map(c => [c[0], c[1]]);

  coords.forEach(c => {
    const marker = L.marker([c[0],c[1]]).addTo(map);
    markers.push(marker);
  });

  if(latlngs.length){
    routeLine = L.polyline(latlngs).addTo(map);
    map.fitBounds(routeLine.getBounds());
  }
}

// 🕸️ Netwerk (D3)
const nodes = [
  {id:"Anne Frank"},
  {id:"Margot Frank"},
  {id:"Edith Frank"},
  {id:"Otto Frank"},
  {id:"Rosa de Winter"}
];

const links = [
  {source:"Anne Frank", target:"Margot Frank"},
  {source:"Anne Frank", target:"Edith Frank"},
  {source:"Anne Frank", target:"Otto Frank"},
  {source:"Rosa de Winter", target:"Otto Frank"}
];

const svg = d3.select("#network")
  .attr("width","100%")
  .attr("height","100%");

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(120))
  .force("charge", d3.forceManyBody().strength(-250))
  .force("center", d3.forceCenter(window.innerWidth*0.2, window.innerHeight/2));

const link = svg.append("g")
  .selectAll("line")
  .data(links)
  .enter().append("line")
  .attr("class","link");

const node = svg.append("g")
  .selectAll("circle")
  .data(nodes)
  .enter().append("circle")
  .attr("r",10)
  .attr("class","node")
  .on("click",(event,d)=> focusPerson(d.id));

const label = svg.append("g")
  .selectAll("text")
  .data(nodes)
  .enter().append("text")
  .text(d=>d.id);

simulation.on("tick", ()=>{
  link
    .attr("x1", d=>d.source.x)
    .attr("y1", d=>d.source.y)
    .attr("x2", d=>d.target.x)
    .attr("y2", d=>d.target.y);

  node
    .attr("cx", d=>d.x)
    .attr("cy", d=>d.y);

  label
    .attr("x", d=>d.x+12)
    .attr("y", d=>d.y);
});

// 🎯 Focus
function focusPerson(name){

  // highlight nodes
  node.classed("active", d => d.id === name);

  // highlight links
  link.classed("active", d =>
    d.source.id === name || d.target.id === name
  );

  document.getElementById("info").innerHTML =
    "<b>"+name+"</b><br>Relaties + route zichtbaar";

  showRoute(name);
}

</script>

</body>
</html>
