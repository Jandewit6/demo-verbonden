<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#controls {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:8px;
  z-index:1000;
}

#infoPanel {
  position:absolute;
  right:10px;
  top:10px;
  width:320px;
  background:white;
  padding:15px;
  border-radius:8px;
  z-index:1000;
  max-height:90vh;
  overflow:auto;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
<b>Personen</b><br>
<button onclick="togglePerson('Anne Frank')">Anne</button>
<button onclick="togglePerson('Edith Frank')">Edith</button>
<button onclick="togglePerson('Otto Frank')">Otto</button>
<button onclick="togglePerson('Rosa de Winter')">Rosa</button>
<button onclick="togglePerson('Judith de Winter')">Judith</button><br><br>

<button onclick="resetPersons()">Reset</button>
</div>

<div id="infoPanel">Klik op een persoon of locatie</div>

<script>

// kaart
const map = L.map('map').setView([50,10], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// kleuren
const colors = {
  "Anne Frank":"red",
  "Edith Frank":"pink",
  "Otto Frank":"green",
  "Rosa de Winter":"blue",
  "Judith de Winter":"purple"
};

let activePersons = new Set(Object.keys(colors));

// basisroutes
const routes = {
"Rosa de Winter":[[52.14,6.2],[52.92,6.61],[50.03,19.2]],
"Judith de Winter":[[52.14,6.2],[52.92,6.61],[50.03,19.2]],
"Edith Frank":[[52.37,4.9],[52.92,6.61],[50.03,19.2]],
"Otto Frank":[[52.37,4.9],[52.92,6.61],[50.03,19.2]]
};

// 🚂 transport 3 sept 1944
const transport3Sept1944 = [
[52.9153,6.6097],
[52.9967,6.5625],
[52.5168,6.0830],
[52.2550,6.1639],
[52.3075,6.9358],
[52.3000,7.1667],
[52.2799,8.0472],
[52.3759,9.7320],
[52.1205,11.6276],
[51.4825,11.9700],
[51.1079,17.0385],
[50.0359,19.1783]
];

// 🚢 Monowai
const monowaiGeoJSON = {
"type":"FeatureCollection",
"features":[
{"type":"Feature","properties":{"name":"Odessa","date":"21 mei 1945"},"geometry":{"type":"Point","coordinates":[30.7233,46.4825]}},
{"type":"Feature","properties":{"name":"Istanbul","date":"23 mei 1945"},"geometry":{"type":"Point","coordinates":[28.9784,41.0082]}},
{"type":"Feature","properties":{"name":"Kreta","date":"24 mei 1945"},"geometry":{"type":"Point","coordinates":[24.8093,35.2401]}},
{"type":"Feature","properties":{"name":"Sardinië","date":"25 mei 1945"},"geometry":{"type":"Point","coordinates":[9.0129,40.1209]}},
{"type":"Feature","properties":{"name":"Corsica","date":"26 mei 1945"},"geometry":{"type":"Point","coordinates":[9.0129,42.0396]}},
{"type":"Feature","properties":{"name":"Marseille","date":"27 mei 1945"},"geometry":{"type":"Point","coordinates":[5.3698,43.2965]}}
]
};

const monowaiRoute = monowaiGeoJSON.features.map(f=>{
const [lon,lat]=f.geometry.coordinates;
return {name:f.properties.name,date:f.properties.date,coords:[lat,lon]};
});

// info
const infoData = {

"Rosa de Winter":`
<h3>Rosa de Winter</h3>
Overleefde Auschwitz.

In het kamp maakte zij deel uit van netwerken van onderlinge zorg.
Zij was aanwezig bij het overlijden van Edith Frank.

Na de bevrijding keerde zij terug via de Monowai.
`,

"Edith Frank":`
<h3>Edith Frank</h3>
Moeder van Anne Frank.

In Auschwitz ernstig verzwakt door honger en ziekte.
Werd verzorgd door medegevangenen, waaronder Rosa de Winter.

Overleed in januari 1945.
`,

"Otto Frank":`
<h3>Otto Frank</h3>
Overleefde Auschwitz en keerde via Odessa en de Monowai terug naar West-Europa.
`,

"Judith de Winter":`
<h3>Judith de Winter</h3>
Dochter van Rosa. Werd samen met haar moeder gedeporteerd.
`,

"deportatie":`
<h3>Deportatietrein</h3>
Transporten vonden plaats in afgesloten goederenwagons.

Reizen duurden meerdere dagen zonder voldoende voedsel, water of sanitaire voorzieningen.
De trein volgde het bestaande Europese spoornetwerk en vormde een essentieel onderdeel
van het deportatiesysteem.
`,

"kratzau":`
<h3>Werkkamp Kratzau</h3>
Kratzau (nu Chrastava) was een nevenkamp binnen het concentratiekampnetwerk.

Gevangenen werden ingezet voor dwangarbeid onder zware omstandigheden,
met weinig voedsel en slechte huisvesting.

Zoals in veel werkkampen draaide het bestaan om overleven binnen een systeem
van uitputting en controle.
`,

"monowai":`
<h3>Repatriëring – schip Monowai</h3>
Na de bevrijding werden overlevenden vanuit Oost-Europa per schip gerepatrieerd.

De Monowai vertrok vanuit Odessa en voer via de Bosporus en de Middellandse Zee
naar Marseille.

De reis markeerde een overgang: van kampgevangenschap naar terugkeer,
maar ook naar onzekerheid over familie, thuis en toekomst.
`,

"westerbork":"Doorgangskamp in Nederland.",
"auschwitz":"Bestemming van deportaties."
};

function showInfo(key){
document.getElementById("infoPanel").innerHTML = infoData[key] || key;
}

let layers=[];

function update(){

layers.forEach(l=>map.removeLayer(l));
layers=[];

// routes
Object.keys(routes).forEach(person=>{
if(!activePersons.has(person)) return;

layers.push(
L.polyline(routes[person],{
color:colors[person],
weight:3
}).on("click",()=>showInfo(person)).addTo(map)
);
});

// deportatie
layers.push(
L.polyline(transport3Sept1944,{
color:"darkred",
weight:6
})
.on("click",()=>showInfo("deportatie"))
.addTo(map)
);

// Westerbork
layers.push(
L.circleMarker([52.92,6.61],{radius:10,fillColor:"yellow",fillOpacity:1})
.on("click",()=>showInfo("westerbork"))
.addTo(map)
);

// Auschwitz
layers.push(
L.circleMarker([50.03,19.2],{radius:10,fillColor:"red",fillOpacity:1})
.on("click",()=>showInfo("auschwitz"))
.addTo(map)
);

// Kratzau
layers.push(
L.circleMarker([50.8167,14.9667],{radius:8,fillColor:"gray",fillOpacity:1})
.on("click",()=>showInfo("kratzau"))
.addTo(map)
);

// Monowai
if(activePersons.has("Otto Frank") || activePersons.has("Rosa de Winter")){

const latlngs = monowaiRoute.map(p=>p.coords);

layers.push(
L.polyline(latlngs,{
color:"cyan",
dashArray:"6,10",
weight:4
})
.on("click",()=>showInfo("monowai"))
.addTo(map)
);

monowaiRoute.forEach(p=>{
layers.push(
L.circleMarker(p.coords,{radius:5,color:"cyan"})
.bindPopup(`<b>${p.name}</b><br>${p.date}`)
.addTo(map)
);
});
}

}

// toggles
function togglePerson(name){
if(activePersons.has(name)) activePersons.delete(name);
else activePersons.add(name);
update();
}

function resetPersons(){
activePersons=new Set(Object.keys(colors));
update();
}

// init
update();

</script>

</body>
</html>
