<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Verbonden Verleden</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#controls {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:8px;
  z-index:1000;
}

#infoPanel {
  position:absolute;
  right:10px;
  top:10px;
  width:320px;
  background:white;
  padding:15px;
  border-radius:8px;
  z-index:1000;
  max-height:90vh;
  overflow:auto;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
<b>Tijd</b><br>
<input type="range" min="0" max="10" value="0" id="slider"><br><br>

<b>Personen</b><br>
<button onclick="togglePerson('Anne Frank')">Anne</button>
<button onclick="togglePerson('Edith Frank')">Edith</button>
<button onclick="togglePerson('Otto Frank')">Otto</button>
<button onclick="togglePerson('Rosa de Winter')">Rosa</button>
<button onclick="togglePerson('Judith de Winter')">Judith</button><br><br>

<button onclick="resetPersons()">Reset</button>
</div>

<div id="infoPanel">Klik op een persoon of locatie</div>

<script>

// kaart
const map = L.map('map').setView([50,10], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// kleuren
const colors = {
  "Anne Frank":"red",
  "Edith Frank":"pink",
  "Otto Frank":"green",
  "Rosa de Winter":"blue",
  "Judith de Winter":"purple"
};

let activePersons = new Set(Object.keys(colors));

// routes
const routes = {

"Rosa de Winter":[
[52.14,6.2], // Zutphen
[52.92,6.61], // Westerbork
[50.03,19.2], // Auschwitz
[46.48,30.73], // Odessa
[43.30,5.37] // Marseille
],

"Judith de Winter":[
[52.14,6.2],
[52.92,6.61],
[50.03,19.2]
],

"Edith Frank":[
[52.37,4.9],
[52.92,6.61],
[50.03,19.2]
],

"Otto Frank":[
[52.37,4.9],
[52.92,6.61],
[50.03,19.2],
[46.48,30.73],
[43.30,5.37]
]

};

// deportatie lijn
const deportationRoute = [
[52.14,6.2],
[52.92,6.61],
[50.03,19.2]
];

// info
const infoData = {

"Rosa de Winter":`
<h3>Rosa de Winter</h3>
Overleefde Auschwitz. In het vrouwenkamp ontmoette zij Edith Frank.

In omstandigheden van honger en ziekte ontstonden kleine netwerken van zorg.
Rosa ondersteunde medegevangenen en was aanwezig bij het overlijden van Edith Frank.

Na de bevrijding keerde zij terug via Odessa en Marseille.
`,

"Edith Frank":`
<h3>Edith Frank</h3>
Moeder van Anne Frank.

In Auschwitz raakte zij ernstig verzwakt. Zij werd verzorgd door medegevangenen,
onder wie Rosa de Winter.

Edith Frank overleed in januari 1945 in Auschwitz, in aanwezigheid van Rosa.
`,

"Judith de Winter":`
<h3>Judith de Winter</h3>
Dochter van Rosa. Werd samen met haar moeder gedeporteerd.

Hun samenzijn in het kamp was essentieel voor overleving.
`,

"Otto Frank":`
<h3>Otto Frank</h3>
Overleefde Auschwitz en keerde terug via een maritieme route naar West-Europa.
`,

"westerbork":`
<h3>Kamp Westerbork</h3>
Doorgangskamp en centraal knooppunt in deportaties.
Hier ontmoetten gevangenen soms opnieuw bekenden.
`,

"auschwitz":`
<h3>Auschwitz-Birkenau</h3>
Vernietigingskamp waar dwangarbeid en massamoord plaatsvonden.

Hier ontstond de relatie van zorg tussen Rosa de Winter en Edith Frank.
`

};

// info tonen
function showInfo(key){
document.getElementById("infoPanel").innerHTML = infoData[key] || key;
}

// layers
let layers=[];

function update(){

layers.forEach(l=>map.removeLayer(l));
layers=[];

// routes tekenen
Object.keys(routes).forEach(person=>{
if(!activePersons.has(person)) return;

const line = L.polyline(routes[person],{
color:colors[person],
weight:3
})
.on("click",()=>showInfo(person))
.addTo(map);

layers.push(line);

});

// deportatie lijn
layers.push(
L.polyline(deportationRoute,{
color:"darkred",
weight:5
}).addTo(map)
);

// Westerbork
layers.push(
L.circleMarker([52.92,6.61],{
radius:10,color:"black",fillColor:"yellow",fillOpacity:1
})
.on("click",()=>showInfo("westerbork"))
.addTo(map)
);

// Auschwitz
layers.push(
L.circleMarker([50.03,19.2],{
radius:10,color:"black",fillColor:"red",fillOpacity:1
})
.on("click",()=>showInfo("auschwitz"))
.addTo(map)
);

}

// personen
function togglePerson(name){
if(activePersons.has(name)) activePersons.delete(name);
else activePersons.add(name);
update();
}

function resetPersons(){
activePersons=new Set(Object.keys(colors));
update();
}

// trein animatie
let trainMarker = L.circleMarker(deportationRoute[0],{
radius:8,color:"black",fillColor:"yellow",fillOpacity:1
}).addTo(map);

function interpolate(a,b,t){
return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
}

function updateTrain(value){
const max=10;
const progress=value/max;
const total=deportationRoute.length-1;

const seg=Math.floor(progress*total);
const t=(progress*total)-seg;

if(seg>=total){
trainMarker.setLatLng(deportationRoute[total]);
return;
}

const pos=interpolate(deportationRoute[seg],deportationRoute[seg+1],t);
trainMarker.setLatLng(pos);
}

// slider
document.getElementById("slider")
.addEventListener("input",(e)=>{
const v=parseInt(e.target.value);
update();
updateTrain(v);
});

// init
update();

</script>

</body>
</html>
